services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: wbs-app
    container_name: wbs-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - db
    networks:
      - wbs-network

  webserver:
    image: nginx:alpine
    container_name: wbs-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - wbs-network

  db:
    image: mysql:8.0
    container_name: wbs-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-wbs_bbkkp}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-wbs_user}
    volumes:
      - wbs-db-data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - wbs-network

networks:
  wbs-network:
    driver: bridge

volumes:
  wbs-db-data:
